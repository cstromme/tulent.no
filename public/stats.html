<!doctype html>
<html lang="nn">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Lokal besøksstatistikk for tulent.no på denne nettlesaren.">
    <title>Stats - tulent.no</title>
    <style>
      :root {
        --bg: #111111;
        --fg: #f6f0e8;
        --muted: #c8bfb4;
        --line: rgba(255, 255, 255, 0.15);
      }
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        min-height: 100%;
      }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        padding: 1.25rem;
      }
      .wrap {
        width: min(100%, 46rem);
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 2rem;
      }
      p {
        margin: 0.5rem 0;
      }
      .muted {
        color: var(--muted);
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 0.8rem;
        padding: 1rem;
        margin-top: 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--muted);
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        padding: 0.65rem 0.75rem;
        background: #191919;
        color: var(--fg);
      }
      button {
        margin-top: 0.75rem;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        padding: 0.6rem 0.85rem;
        background: #222222;
        color: var(--fg);
        cursor: pointer;
      }
      ul {
        margin: 0.75rem 0 0;
        padding: 0;
        list-style: none;
      }
      li {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.4rem 0;
        border-top: 1px solid var(--line);
      }
      .err {
        color: #ffb9b9;
        min-height: 1.2rem;
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }
      .small {
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="top">
        <h1>Lokal stats</h1>
        <a class="muted small" href="./">Til forsida</a>
      </div>
      <p class="muted">Dette viser berre lokale data frå denne nettlesaren/eininga.</p>

      <section id="login-card" class="card">
        <p id="login-help" class="muted">Logg inn for å sjå lokal statistikk.</p>
        <form id="login-form">
          <label for="password">Passord</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
          <button type="submit">Logg inn</button>
        </form>
        <p id="login-error" class="err"></p>
      </section>

      <section id="stats-card" class="card" hidden>
        <div class="top">
          <p id="stats-summary"></p>
          <button id="logout-btn" type="button">Logg ut</button>
        </div>
        <p id="stats-window" class="muted small"></p>
        <ul id="daily-list"></ul>
      </section>
    </main>

    <script type="module" src="./stats.js"></script>
  </body>
</html>
